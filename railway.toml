# Cortex V1 — deploy ONLY this service (@cortex/web). Do not add worker services.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "apps/web/**",
  "packages/**",
  "scripts/**",
  "Dockerfile",
  "railway.toml",
  "package.json",
  "bun.lock",
  "tsconfig.base.json",
]

[deploy]
startCommand = "bun run start:web"
preDeployCommand = "bun run db:migrate"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
